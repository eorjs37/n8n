version: "3.8"

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./nginx/prod/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - n8n

  n8n:
    image: n8nio/n8n:latest
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8npass

      - N8N_HOST=n8n.techside.co.kr:8443
      - WEBHOOK_URL=https://n8n.techside.co.kr:8443/
      - N8N_PROTOCOL=https
      - N8N_PROXY_HOPS=1

      - N8N_DISABLE_RATE_LIMIT=true

      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_ENCRYPTION_KEY=my-local-key
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  postgres:
    image: postgres:14
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8npass
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  n8n_data:
  postgres_data:
